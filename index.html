<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elector Appeal Dashboard</title>
    <style>
        :root{--bg:#f0f2f5;--card:#fff;--text:#172033;--muted:#6b7a8f;--line:#e2e8f0;--primary:#2563eb;--success:#16a34a;--danger:#dc2626;--warning:#ca8a04}
        *{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}
        header{background:linear-gradient(135deg,#172033,#1e293b);color:#fff;padding:14px 24px;position:sticky;top:0;z-index:100}
        .wrap{max-width:1280px;margin:auto;padding:16px 20px}
        h1{font-size:20px;margin:0}h2{font-size:16px;margin:0 0 10px}
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
        .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px}
        .stat{text-align:center;padding:10px 6px;border-radius:12px}
        .stat b{display:block;font-size:24px;margin-top:2px}
        .stat-total{background:linear-gradient(135deg,#eff6ff,#dbeafe)}
        .stat-total b{color:#1d4ed8}
        .stat-included{background:linear-gradient(135deg,#dcfce7,#bbf7d0)}
        .stat-included b{color:#15803d}
        .stat-excluded{background:linear-gradient(135deg,#fee2e2,#fecaca)}
        .stat-excluded b{color:#b91c1c}
        .stat-pending{background:linear-gradient(135deg,#fef9c3,#fde68a)}
        .stat-pending b{color:#854d0e}
        .stat-male{background:linear-gradient(135deg,#e0e7ff,#c7d2fe)}
        .stat-male b{color:#3730a3}
        .stat-female{background:linear-gradient(135deg,#fce7f3,#fbcfe8)}
        .stat-female b{color:#9d174d}
        .form{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
        label{font-size:12px;font-weight:600;display:block;margin-bottom:4px;color:var(--muted)}
        label .required{color:var(--danger);margin-left:2px}
        input,select{width:100%;padding:9px 12px;border:2px solid var(--line);border-radius:10px;font-size:14px}
        input:focus,select:focus{outline:none;border-color:var(--primary)}
        button{border:0;border-radius:10px;padding:9px 16px;font-weight:600;cursor:pointer;font-size:13px}
        .primary{background:var(--primary);color:#fff}
        .danger{background:var(--danger);color:#fff}
        .success{background:var(--success);color:#fff}
        .light{background:#f1f5f9;color:#1e293b}
        .dark{background:#1e293b;color:#fff}
        .warning{background:var(--warning);color:#fff}
        .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
        .filters{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
        .filters .filter-group{display:flex;flex-direction:column;gap:3px;flex:1;min-width:130px}
        .tablebox{overflow:auto;border-radius:12px;border:1px solid var(--line)}
        table{border-collapse:collapse;width:100%;min-width:700px;font-size:13px}
        th,td{padding:9px 11px;border-bottom:1px solid var(--line);text-align:left}
        th{background:#f8fafc;font-weight:700;font-size:11px;color:var(--muted);position:sticky;top:0;z-index:10}
        .badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:700}
        .badge-included{background:#dcfce7;color:#15803d}
        .badge-excluded{background:#fee2e2;color:#b91c1c}
        .badge-pending{background:#fef9c3;color:#854d0e}
        .error-msg{background:#fee2e2;color:#b91c1c;padding:8px 14px;border-radius:10px;margin-bottom:10px;display:none;border-left:4px solid var(--danger)}
        .success-msg{background:#dcfce7;color:#15803d;padding:8px 14px;border-radius:10px;margin-bottom:10px;display:none;border-left:4px solid var(--success)}
        .muted{color:var(--muted);font-size:13px}
        .no-print{display:block}
        @media print{.no-print{display:none!important}}
        @media(max-width:600px){.wrap{padding:10px}.form{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}}

        /* ===== Summary Table UI ===== */
        .report-table{
            width:100%;
            border-collapse:collapse;
            margin-top:10px;
            font-size:13px;
            overflow:hidden;
            border-radius:10px;
        }

        .report-table th{
            background:linear-gradient(135deg,#2563eb,#1d4ed8);
            color:white;
            padding:8px;
            text-align:center;
            font-size:12px;
        }

        .report-table td{
            padding:8px;
            border:1px solid #e2e8f0;
            text-align:center;
        }

        .report-table tr:nth-child(even){
            background:#f8fafc;
        }

        .report-table tr:hover{
            background:#eff6ff;
        }

        .report-table .total-row{
            background:#dbeafe!important;
            font-weight:700;
        }

        .report-table .inc{
            color:#15803d;
            font-weight:700;
        }

        .report-table .exc{
            color:#b91c1c;
            font-weight:700;
        }

        .report-table .pen{
            color:#854d0e;
            font-weight:700;
        }

        .report-title{
            font-size:13px;
            font-weight:700;
            color:#334155;
            margin:12px 0 5px;
        }

        .summary-card{
            background:#fff;
            border:1px solid #e2e8f0;
            border-radius:14px;
            padding:14px;
            margin-bottom:14px;
        }

        .summary-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:10px;
        }

        .summary-header h3{
            margin:0;
            font-size:17px;
            color:#172033;
        }

        .total-badge{
            background:#eff6ff;
            color:#2563eb;
            padding:5px 14px;
            border-radius:20px;
            font-size:12px;
            font-weight:700;
        }

        @media(max-width:600px){
            .report-table{
                font-size:11px;
            }
            .report-table th,
            .report-table td{
                padding:5px;
            }
        }
    </style>
</head>
<body>
<header>
    <div style="max-width:1280px;margin:auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <h1>📊 Elector Appeal Dashboard</h1>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <span style="font-size:12px;opacity:0.8" id="headerStats">0 records</span>
            <button style="background:rgba(255,255,255,0.15);color:#fff;padding:4px 12px;font-size:11px;border:0;border-radius:6px;cursor:pointer" onclick="if(confirm('Delete all data?')){localStorage.clear();location.reload()}">🗑️ Reset</button>
        </div>
    </div>
</header>
<main class="wrap">

<!-- Add Record -->
<section class="card no-print">
    <h2>➕ Add Elector Record</h2>
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>
    <div class="form">
        <div><label>AC No. <span class="required">*</span></label><input id="ac" inputmode="numeric" placeholder="e.g. 1"></div>
        <div><label>Part No. <span class="required">*</span></label><input id="part" inputmode="numeric" placeholder="e.g. 1"></div>
        <div><label>Serial No. <span class="required">*</span></label><input id="serial" placeholder="Serial number"></div>
        <div><label>EPIC No. <span class="required">*</span></label><input id="epic" placeholder="EPIC number"></div>
        <div><label>Appeal Code <span class="required">*</span></label>
            <select id="appeal"><option value="">Select</option><option>17(C)</option><option>17(D)</option><option>17(E) </option><option>17(F)</option><option>20(G)</option><option>20(O)</option></select>
        </div>
        <div><label>Status <span class="required">*</span></label>
            <select id="status"><option value="">Select</option><option>Included</option><option>Excluded</option><option>Pending</option></select>
        </div>
        <div><label>Age Group <span class="required">*</span></label>
            <select id="age"><option value="">Select</option><option>18-25</option><option>26-35</option><option>36-45</option><option>46-55</option><option>&gt;55</option></select>
        </div>
        <div><label>Gender <span class="required">*</span></label>
            <select id="gender"><option value="">Select</option><option>M</option><option>F</option></select>
        </div>
    </div>
    <div class="actions">
        <button class="primary" id="addBtn" onclick="addRecord()">➕ Add Record</button>
    </div>
</section>

<!-- Stats -->
<section id="overall"></section>

<!-- AC Summary -->
<section class="card"><h2>📂 AC-wise Summary</h2><div id="acSummary"></div></section>

<!-- Part Summary -->
<section class="card"><h2>📂 Part-wise Summary</h2><div id="partSummary"></div></section>

<!-- Filter -->
<section class="card no-print">
    <h2>🔍 Filter &amp; Report</h2>
    <div class="filters">
        <div class="filter-group">
            <label>🔎 EPIC Search</label>
            <input id="search" placeholder="Enter EPIC No." oninput="render()">
        </div>
        <div class="filter-group"><label>📂 AC</label><select id="acFilter" onchange="render()"><option value="">All AC</option></select></div>
        <div class="filter-group"><label>📂 Part</label><select id="boothFilter" onchange="render()"><option value="">All Parts</option></select></div>
        <div class="filter-group"><label>📌 Status</label><select id="statusFilter" onchange="render()"><option value="">All Status</option><option>Included</option><option>Excluded</option><option>Pending</option></select></div>
        <div style="display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap;flex:0 0 auto">
            <button class="dark" onclick="window.print()">🖨️ PDF</button>
            <button class="light" onclick="exportCSV()">📥 CSV</button>
        </div>
    </div>
</section>

<!-- Detailed Records -->
<section class="card">
    <h2>📋 Detailed Records <span class="muted" id="recordCount"></span></h2>
    <div class="tablebox">
        <table>
            <thead><tr><th>AC No.</th><th>Part No.</th><th>Serial No.</th><th>EPIC No.</th><th>Appeal Code</th><th>Status</th><th>Age</th><th>Gender</th><th class="no-print">Action</th></tr></thead>
            <tbody id="rows"></tbody>
        </table>
    </div>
</section>
</main>

<script>
// ============ DATA ============
const AGES=["18-25","26-35","36-45","46-55",">55"];

let records=JSON.parse(localStorage.getItem("electorAppealRecords")||"[]");
let editIndex=null;

records.sort((a, b) => {
    if (Number(a.ac) !== Number(b.ac)) return Number(a.ac) - Number(b.ac);
    if (Number(a.part) !== Number(b.part)) return Number(a.part) - Number(b.part);
    return Number(a.serial) - Number(b.serial);
});

const esc=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
const count=(arr,key,val)=>arr.filter(x=>x[key]===val).length;

function save(){
    localStorage.setItem("electorAppealRecords",JSON.stringify(records));
    render();
}

function sortRecords(){
    records.sort((a, b) => {
        if (Number(a.ac) !== Number(b.ac)) return Number(a.ac) - Number(b.ac);
        if (Number(a.part) !== Number(b.part)) return Number(a.part) - Number(b.part);
        return Number(a.serial) - Number(b.serial);
    });
}

// ============ ADD / EDIT (with duplicate checks) ============
function addRecord(){
    const get=id=>document.getElementById(id);
    const errorMsg=document.getElementById("errorMsg");
    const successMsg=document.getElementById("successMsg");
    errorMsg.style.display="none";
    successMsg.style.display="none";
    
    const ac=get("ac").value.trim();
    const part=get("part").value.trim();
    const serial=get("serial").value.trim();
    const epic=get("epic").value.trim().toUpperCase();
    const appeal=get("appeal").value;
    const status=get("status").value;
    const age=get("age").value;
    const gender=get("gender").value;
    
    // ===== DUPLICATE CHECK 1: EPIC =====
    if(epic && records.some((r,i)=>r.epic===epic && i!==editIndex)){
        errorMsg.style.display="block";
        errorMsg.textContent="⚠️ Duplicate EPIC number found!";
        return;
    }
    
    // ===== DUPLICATE CHECK 2: Part + Serial =====
    if(part && serial && records.some((r,i)=>r.part===part && r.serial===serial && i!==editIndex)){
        errorMsg.style.display="block";
        errorMsg.textContent="⚠️ Duplicate Serial Number found under same Part No.!";
        return;
    }
    
    const fields = [
        {label:"AC No.", value:ac},{label:"Part No.", value:part},
        {label:"Serial No.", value:serial},{label:"EPIC No.", value:epic},
        {label:"Appeal Code", value:appeal},{label:"Status", value:status},
        {label:"Age Group", value:age},{label:"Gender", value:gender}
    ];
    const missing = fields.filter(f => !f.value || f.value === "" || f.value === "Select");
    if(missing.length > 0){
        errorMsg.style.display="block";
        errorMsg.textContent="⚠️ Please complete: "+missing.map(f=>f.label).join(", ");
        return;
    }
    
    const r = {ac, part, serial, epic, appeal, status, age, gender};
    
    if(editIndex!==null){
        records[editIndex]=r;
        editIndex=null;
        document.getElementById("addBtn").textContent='➕ Add Record';
        successMsg.textContent="✅ Record updated!";
    }else{
        records.push(r);
        successMsg.textContent="✅ Record added! (AC "+ac+", Part "+part+")";
    }
    
    sortRecords();
    save();
    successMsg.style.display="block";
    setTimeout(()=>successMsg.style.display="none",2000);
    
    ["ac","part","serial","epic"].forEach(id=>get(id).value="");
    ["appeal","status","age","gender"].forEach(id=>get(id).selectedIndex=0);
}

function editRecord(i){
    const r=records[i];
    editIndex=i;
    document.getElementById("ac").value=r.ac;
    document.getElementById("part").value=r.part;
    document.getElementById("serial").value=r.serial;
    document.getElementById("epic").value=r.epic;
    document.getElementById("appeal").value=r.appeal;
    document.getElementById("status").value=r.status;
    document.getElementById("age").value=r.age;
    document.getElementById("gender").value=r.gender;
    document.getElementById("addBtn").textContent='✏️ Update';
    document.getElementById("ac").focus();
    window.scrollTo({top:0,behavior:'smooth'});
}

function del(i){
    if(confirm("Delete this record?")){records.splice(i,1);editIndex=null;document.getElementById("addBtn").textContent='➕ Add Record';sortRecords();save();}
}

// ============ FILTER FUNCTION (ONLY EPIC SEARCH) ============
function getFilteredData(){
    const q=document.getElementById("search").value.trim().toLowerCase();
    const acf=document.getElementById("acFilter").value;
    const bf=document.getElementById("boothFilter").value;
    const sf=document.getElementById("statusFilter").value;
    return records.filter(r=>(!acf||r.ac===acf)&&(!bf||r.part===bf)&&(!sf||r.status===sf)&&(!q||r.epic.toLowerCase().includes(q)));
}

function exportCSV(){
    if(!records.length)return alert("No records!");
    let lines=[["AC No.","Part No.","Serial No.","EPIC No.","Appeal Code","Status","Age","Gender"]];
    records.forEach(r=>lines.push([r.ac,r.part,r.serial,r.epic,r.appeal,r.status,r.age,r.gender]));
    let csv=lines.map(a=>a.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
    let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));a.download="elector-records.csv";a.click();
}

// ============ RENDER ============
function render(){
    // Update filters
    const acs=[...new Set(records.map(r=>r.ac))].sort((a,b)=>Number(a)-Number(b));
    const acFilter=document.getElementById("acFilter");
    const oldAc=acFilter.value;
    acFilter.innerHTML='<option value="">All AC</option>'+acs.map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join("");
    acFilter.value=oldAc;
    
    const parts=[...new Set(records.map(r=>r.part))].sort((a,b)=>Number(a)-Number(b));
    const boothFilter=document.getElementById("boothFilter");
    const oldPart=boothFilter.value;
    boothFilter.innerHTML='<option value="">All Parts</option>'+parts.map(b=>`<option value="${esc(b)}">${esc(b)}</option>`).join("");
    boothFilter.value=oldPart;
    
    const shown=getFilteredData();
    const total=shown.length, inc=count(shown,"status","Included"), exc=count(shown,"status","Excluded"), pen=count(shown,"status","Pending"), male=count(shown,"gender","M"), fem=count(shown,"gender","F");
    
    document.getElementById("headerStats").textContent=total+" records";
    
    document.getElementById("overall").innerHTML=`<div class="grid">
        <div class="stat stat-total">👥<span class="muted" style="display:block;font-size:11px">Total</span><b>${total}</b></div>
        <div class="stat stat-included">✅<span class="muted" style="display:block;font-size:11px">Included</span><b>${inc}</b></div>
        <div class="stat stat-excluded">❌<span class="muted" style="display:block;font-size:11px">Excluded</span><b>${exc}</b></div>
        <div class="stat stat-pending">❓<span class="muted" style="display:block;font-size:11px">Pending</span><b>${pen}</b></div>
        <div class="stat stat-male">👨<span class="muted" style="display:block;font-size:11px">Male</span><b>${male}</b></div>
        <div class="stat stat-female">👩<span class="muted" style="display:block;font-size:11px">Female</span><b>${fem}</b></div>
    </div>`;
    
    // ===== AC-wise Summary =====
    document.getElementById("acSummary").innerHTML=acs.length?acs.map(ac=>{
        let a=records.filter(r=>r.ac===ac);
        const t=a.length;
        
        const maleInc=count(a.filter(r=>r.gender==="M"),"status","Included");
        const maleExc=count(a.filter(r=>r.gender==="M"),"status","Excluded");
        const malePen=count(a.filter(r=>r.gender==="M"),"status","Pending");
        const maleTotal=maleInc+maleExc+malePen;
        
        const femaleInc=count(a.filter(r=>r.gender==="F"),"status","Included");
        const femaleExc=count(a.filter(r=>r.gender==="F"),"status","Excluded");
        const femalePen=count(a.filter(r=>r.gender==="F"),"status","Pending");
        const femaleTotal=femaleInc+femaleExc+femalePen;
        
        const ageData=AGES.map(ag=>{
            const incAg=count(a.filter(r=>r.status==="Included"),"age",ag);
            const excAg=count(a.filter(r=>r.status==="Excluded"),"age",ag);
            const penAg=count(a.filter(r=>r.status==="Pending"),"age",ag);
            const totalAg=incAg+excAg+penAg;
            return {age:ag, inc:incAg, exc:excAg, pen:penAg, total:totalAg};
        });
        
        return `<div class="summary-card">
            <div class="summary-header">
                <h3>🏛️ AC ${esc(ac)}</h3>
                <span class="total-badge">Total: ${t}</span>
            </div>
            
            <div class="report-title">👥 Gender-wise Status</div>
            <table class="report-table">
                <thead>
                    <tr>
                        <th>Gender</th>
                        <th>✅ Included</th>
                        <th>❌ Excluded</th>
                        <th>❓ Pending</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>👨 Male</td>
                        <td class="inc">${maleInc}</td>
                        <td class="exc">${maleExc}</td>
                        <td class="pen">${malePen}</td>
                        <td>${maleTotal}</td>
                    </tr>
                    <tr>
                        <td>👩 Female</td>
                        <td class="inc">${femaleInc}</td>
                        <td class="exc">${femaleExc}</td>
                        <td class="pen">${femalePen}</td>
                        <td>${femaleTotal}</td>
                    </tr>
                </tbody>
            </table>
            
            <div class="report-title">📊 Age-wise Status</div>
            <table class="report-table">
                <thead>
                    <tr>
                        <th>Age Group</th>
                        <th>✅ Included</th>
                        <th>❌ Excluded</th>
                        <th>❓ Pending</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody>
                    ${ageData.map(d=>`
                        <tr>
                            <td>${d.age}</td>
                            <td class="inc">${d.inc}</td>
                            <td class="exc">${d.exc}</td>
                            <td class="pen">${d.pen}</td>
                            <td>${d.total}</td>
                        </tr>
                    `).join("")}
                </tbody>
            </table>
        </div>`;
    }).join(""):'<p class="muted">No AC data yet.</p>';
    
    // ===== Part-wise Summary =====
    document.getElementById("partSummary").innerHTML=parts.length?parts.map(part=>{
        let a=records.filter(r=>r.part===part);
        const t=a.length;
        
        const maleInc=count(a.filter(r=>r.gender==="M"),"status","Included");
        const maleExc=count(a.filter(r=>r.gender==="M"),"status","Excluded");
        const malePen=count(a.filter(r=>r.gender==="M"),"status","Pending");
        const maleTotal=maleInc+maleExc+malePen;
        
        const femaleInc=count(a.filter(r=>r.gender==="F"),"status","Included");
        const femaleExc=count(a.filter(r=>r.gender==="F"),"status","Excluded");
        const femalePen=count(a.filter(r=>r.gender==="F"),"status","Pending");
        const femaleTotal=femaleInc+femaleExc+femalePen;
        
        const ageData=AGES.map(ag=>{
            const incAg=count(a.filter(r=>r.status==="Included"),"age",ag);
            const excAg=count(a.filter(r=>r.status==="Excluded"),"age",ag);
            const penAg=count(a.filter(r=>r.status==="Pending"),"age",ag);
            const totalAg=incAg+excAg+penAg;
            return {age:ag, inc:incAg, exc:excAg, pen:penAg, total:totalAg};
        });
        
        return `<div class="summary-card">
            <div class="summary-header">
                <h3>🏛️ Part ${esc(part)}</h3>
                <span class="total-badge">Total: ${t}</span>
            </div>
            
            <div class="report-title">👥 Gender-wise Status</div>
            <table class="report-table">
                <thead>
                    <tr>
                        <th>Gender</th>
                        <th>✅ Included</th>
                        <th>❌ Excluded</th>
                        <th>❓ Pending</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>👨 Male</td>
                        <td class="inc">${maleInc}</td>
                        <td class="exc">${maleExc}</td>
                        <td class="pen">${malePen}</td>
                        <td>${maleTotal}</td>
                    </tr>
                    <tr>
                        <td>👩 Female</td>
                        <td class="inc">${femaleInc}</td>
                        <td class="exc">${femaleExc}</td>
                        <td class="pen">${femalePen}</td>
                        <td>${femaleTotal}</td>
                    </tr>
                </tbody>
            </table>
            
            <div class="report-title">📊 Age-wise Status</div>
            <table class="report-table">
                <thead>
                    <tr>
                        <th>Age Group</th>
                        <th>✅ Included</th>
                        <th>❌ Excluded</th>
                        <th>❓ Pending</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody>
                    ${ageData.map(d=>`
                        <tr>
                            <td>${d.age}</td>
                            <td class="inc">${d.inc}</td>
                            <td class="exc">${d.exc}</td>
                            <td class="pen">${d.pen}</td>
                            <td>${d.total}</td>
                        </tr>
                    `).join("")}
                </tbody>
            </table>
        </div>`;
    }).join(""):'<p class="muted">No Part data yet.</p>';
    
    document.getElementById("recordCount").textContent=`(${shown.length} records)`;
    document.getElementById("rows").innerHTML=shown.map((r,i)=>{
        const idx=records.indexOf(r);
        const badgeClass={Included:"badge-included",Excluded:"badge-excluded",Pending:"badge-pending"}[r.status]||"";
        return `<tr>
            <td><strong>${esc(r.ac)}</strong></td>
            <td><strong>${esc(r.part)}</strong></td>
            <td>${esc(r.serial)}</td>
            <td><code style="background:#f1f5f9;padding:1px 8px;border-radius:4px;font-size:12px">${esc(r.epic)}</code></td>
            <td>${esc(r.appeal)}</td>
            <td><span class="badge ${badgeClass}">${esc(r.status)}</span></td>
            <td>${esc(r.age)}</td>
            <td>${esc(r.gender)}</td>
            <td class="no-print" style="display:flex;gap:4px;flex-wrap:wrap">
                <button class="warning" onclick="editRecord(${idx})" style="padding:3px 10px;font-size:11px;border:0;border-radius:6px;cursor:pointer">✏️</button>
                <button class="danger" onclick="del(${idx})" style="padding:3px 10px;font-size:11px;border:0;border-radius:6px;cursor:pointer">🗑️</button>
            </td>
        </tr>`;
    }).join("")||'<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--muted)">📭 No records found.</td></tr>';
}

// ============ INIT ============
render();
</script>
</body>
</html>
